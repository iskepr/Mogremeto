name: mogremeto
description: "A new Flutter Game."
publish_to: 'Skepr'
version: 1.0.0+1

environment:
  sdk: ^3.8.0-24.0.dev

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shared_preferences: ^2.5.1
  audioplayers: ^6.1.1
  google_mobile_ads: ^5.3.1
  url_launcher: ^6.3.1
  supabase_flutter: ^2.8.3
  package_info_plus: ^8.2.1
  http: ^1.3.0
  startapp_sdk: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  change_app_package_name: ^1.4.0


flutter:

  uses-material-design: true

  assets:
    - assets/imgs/
    - assets/sounds/

  fonts:
    - family: foda
      fonts:
        - asset: assets/fonts/فودا.ttf